set_service_state:
  name: Set service state
  description: Set one or more Control D services to Off, Blocked, Bypassed, or Redirected across the selected profiles. Redirect targets are only applied when Mode is Redirected.
  fields:
    profile_id:
      required: false
      example: |
        ["7b6d4e8a2c0141e8b6d0f9a3c2e4d1f0", "9f2a6c4e1b7d43a8a0c5e2f1d9b6c3a7"]
      selector:
        device:
          multiple: true
          filter:
            - integration: controld_manager
              model: Profile
    profile_name:
      required: false
      example: |
        ["Primary", "Kids"]
      selector:
        text:
    service_id:
      required: false
      example: |
        ["amazonmusic"]
      selector:
        text:
    service_name:
      required: false
      example: |
        ["Amazon Music"]
      selector:
        text:
    mode:
      required: true
      example: "Blocked"
      selector:
        select:
          options:
            - "Off"
            - "Blocked"
            - "Bypassed"
            - "Redirected"
    redirect_target:
      required: false
      description: Redirect destination. Use a Control D location code or name, `LOCAL` for auto routing, `?` for random routing, or an IP address for proxy redirects.
      example: "WFR"
      selector:
        text:
    redirect_target_type:
      required: false
      description: Optional redirect target family. When omitted, the integration infers `ipv4` or `ipv6` from a valid IP address and treats other values, including `LOCAL` and `?`, as location-family redirects.
      example: "location"
      selector:
        select:
          options:
            - location
            - ipv4
            - ipv6
    config_entry_id:
      required: false
      selector:
        config_entry:
          integration: controld_manager
    config_entry_name:
      required: false
      selector:
        text:

set_option_state:
  name: Set option state
  description: Set one or more Control D profile options across the selected profiles. Use Enabled for toggle-style options, or to turn select-style options off and on with their default value when available, otherwise the first available choice. Use Value when you need to choose a specific select-style option value or set a numeric TTL-style field option.
  fields:
    profile_id:
      required: false
      example: |
        ["7b6d4e8a2c0141e8b6d0f9a3c2e4d1f0", "9f2a6c4e1b7d43a8a0c5e2f1d9b6c3a7"]
      selector:
        device:
          multiple: true
          filter:
            - integration: controld_manager
              model: Profile
    profile_name:
      required: false
      example: |
        ["Primary", "Kids"]
      selector:
        text:
    option_id:
      required: false
      example: |
        ["safesearch", "ai_malware"]
      selector:
        text:
    option_name:
      required: false
      example: |
        ["Safe Search", "AI Malware Filter"]
      selector:
        text:
    enabled:
      required: false
      selector:
        boolean:
    value:
      required: false
      example: "20"
      selector:
        text:
    config_entry_id:
      required: false
      selector:
        config_entry:
          integration: controld_manager
    config_entry_name:
      required: false
      selector:
        text:

set_default_rule_state:
  name: Set default rule state
  description: Set the Control D default-rule behavior to Blocking, Bypassing, or Redirecting across the selected profiles. Redirect targets are only applied when Mode is Redirecting.
  fields:
    profile_id:
      required: false
      example: |
        ["7b6d4e8a2c0141e8b6d0f9a3c2e4d1f0", "9f2a6c4e1b7d43a8a0c5e2f1d9b6c3a7"]
      selector:
        device:
          multiple: true
          filter:
            - integration: controld_manager
              model: Profile
    profile_name:
      required: false
      example: |
        ["Primary", "Kids"]
      selector:
        text:
    mode:
      required: true
      example: "Bypassing"
      selector:
        select:
          options:
            - "Blocking"
            - "Bypassing"
            - "Redirecting"
    redirect_target:
      required: false
      example: "WFR"
      description: When Mode is Redirecting, specify a Control D location code or name, `LOCAL` for auto routing, or `?` for random routing.
      selector:
        text:
    redirect_target_type:
      required: false
      example: "location"
      description: Optional redirect target family. Default-rule redirects currently support only Control D location-family routing, including the special `LOCAL` auto and `?` random values.
      selector:
        select:
          options:
            - location
    config_entry_id:
      required: false
      selector:
        config_entry:
          integration: controld_manager
    config_entry_name:
      required: false
      selector:
        text:

get_catalog:
  name: Get catalog
  description: Return a copyable catalog of filters, services, rules, or profile options for the selected Control D scope.
